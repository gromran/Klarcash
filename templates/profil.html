{% extends "base.html" %}
{% block title %}Profil – Klarcash{% endblock %}
{% block content %}

<h1>Profil</h1>
<p class="subtitle">Angemeldet als {{ current_user.username }} ({{ current_user.role }}).</p>

<div class="form-card">
<form method="post">
    <div class="field">
        <label for="current_password">Aktuelles Passwort</label>
        <input type="password" name="current_password" id="current_password" autofocus required>
    </div>
    <div class="field">
        <label for="new_password">Neues Passwort</label>
        <input type="password" name="new_password" id="new_password" required>
        <small>Mindestens 8 Zeichen.</small>
    </div>
    <div class="field">
        <label for="new_password_confirm">Neues Passwort bestätigen</label>
        <input type="password" name="new_password_confirm" id="new_password_confirm" required>
    </div>
    <div class="actions-row" style="justify-content:flex-end; margin-bottom:0;">
        <button type="submit" class="btn btn-primary">Passwort ändern</button>
    </div>
</form>
</div>

{% endblock %}
